services:
  songtag:
    image: ghcr.io/YOUR_GITHUB_USERNAME/songtag:latest
    # To build locally instead of pulling from GitHub:
    # build: .
    container_name: songtag
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
